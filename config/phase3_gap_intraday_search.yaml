strategy_spaces:
  S26_real_gap_intraday:
    kind: real_gap_intraday
    budget: 72
    fixed:
      data_tier: free_real
      rebalance: daily
      entry_rebalance: daily
      min_listing_days: 180
      min_price: 3.0
      min_avg_amount_20d: 20000000
      exclude_st: true
    parameters:
      mode: [up_continuation, down_reversal, up_exhaustion_reversal]
      min_gap: [0.01, 0.02, 0.03, 0.05]
      min_intraday: [0.0, 0.01, 0.02]
      min_amount_ratio: [0.8, 1.0, 1.5, 2.0]
      exit_window: [3, 5, 10]
      holding_k: [1, 2, 3, 5]
      max_holding_days: [1, 3, 5, 10]
      trailing_stop: [0.05, 0.08, 0.12]
