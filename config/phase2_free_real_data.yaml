data_tier: free_real
primary_source: baostock
secondary_source: akshare
proxy_source: qlib
data_root: /Volumes/PSSD1TB/量化数据

date_range:
  start_date: "20100101"
  end_date: "20260704"

download:
  universe_scope: point_in_time
  frozen_universe_path: 00_meta/universes/phase2_free_point_in_time_20100101_20260704.csv
  shard_size: 50
  manifest_batch_size: 50
  physical_interface: en0
  refresh_metadata: false

panel_build:
  batch_codes: 100
  allow_partial: false
  expected_symbols: 5472
  delisting_terminal_value_fraction: 0.0

paths:
  manifest: 00_meta/manifests/phase2_free_real_manifest.csv
  validation_report: reports/phase2_free/free_real_data_validation.md
  leaderboard: reports/phase2_free/free_real_stock_leaderboard.csv
  top_strategies: reports/phase2_free/free_real_top_strategies.md
  target_windows: reports/phase2_free/free_real_target_windows.csv
  target_leaderboard: reports/phase2_free/free_real_target_leaderboard.csv
  target_report: reports/phase2_free/free_real_target_backtest.md
  overlay_windows: reports/phase2_free/overlay_research_windows.csv
  overlay_leaderboard: reports/phase2_free/overlay_research_leaderboard.csv
  overlay_report: reports/phase2_free/overlay_research_report.md

sources:
  baostock:
    enabled: true
    adjustflag_raw: "3"
    adjustflag_signal: "2"
    fields_raw:
      - date
      - code
      - open
      - high
      - low
      - close
      - preclose
      - volume
      - amount
      - turn
      - tradestatus
      - pctChg
      - peTTM
      - pbMRQ
      - psTTM
      - pcfNcfTTM
      - isST
  akshare:
    enabled: true
    use_for_cross_check: true
    use_for_etf: true
    use_for_index: true
  qlib:
    enabled: false
    data_tier: proxy_research

free_real_gates:
  allow_s2_stock_momentum: true
  allow_s3_stock_breakout: true
  allow_s4_smallcap_factor: true
  allow_s5_limitup_board: false
  allow_futures_overlay: false
  allow_options_overlay: false

field_sources:
  daily: baostock_unadjusted
  amount: baostock_prior_signal_day_amount_for_participation_stress_only
  adj_close_for_signal: baostock_qfq_or_akshare_qfq
  is_suspended: baostock_tradestatus
  is_st: baostock_isST
  up_limit: derived_from_preclose_and_board_rules
  down_limit: derived_from_preclose_and_board_rules
  circ_mv_approx: derived_from_amount_and_turnover

phase2_real_stock_strategies:
  S2_real_stock_momentum:
    min_listing_days: 120
    min_price: 3.0
    min_avg_amount_20d: 20000000
    holding_k: [1, 2, 3, 5, 8, 10]
    rebalance: [daily, 2d, weekly]
  S3_real_stock_breakout:
    donchian: [20, 55]
    exit_donchian: 20
    holding_k: [1, 2, 3, 5]
    max_holding_days: 60
    min_volume_breakout: 1.2
  S4_real_smallcap_factor:
    min_listing_days: 180
    min_price: 3.0
    min_avg_amount_20d: 10000000
    factor_modes: [low_turnover, high_turnover_breakout]
    rebalance: [weekly, monthly]
    holding_k: [10, 20, 30, 50]

target_backtest:
  monthly_deposit: 30000
  target_month_12: 500000
  target_month_24: 1200000
  window_months: 24
  min_trading_days: 420
  min_symbols: 5472
  candidate_gates:
    min_nonoverlap_hit_share_lower95: 0.50
    min_p05_w24: 720000
    max_p95_drawdown: 0.35
    joint_success_alpha: 0.05
    min_nonoverlap_blocks: 5
    min_nonoverlap_w24: 720000
    max_nonoverlap_drawdown: 0.35
    max_unfilled_sell_share: 0.10
    max_margin_call_window_share: 0.0
    max_default_window_share: 0.0
  execution:
    lot_size: 100
    max_order_notional: 100000
    commission_bps: 2.0
    min_commission: 5.0
    transfer_fee_bps: 0.1
    stamp_tax_sell_bps: 10.0
    slippage_bps: 5.0
    target_weight_buffer: 0.05
    max_daily_amount_participation:

overlay_research:
  data_tier: proxy_overlay_research
  index_close_path: /Volumes/PSSD1TB/量化数据/processed/phase1_daily_close.csv
  top_base_rows: 4
  futures:
    contracts: [IF, IH, IC, IM]
    target_beta: [0.5, 1.0, 2.0]
    effective_margin_rates: [0.15, 0.20]
    cash_buffer_pct: [0.33, 0.50, 0.80]
  options:
    contracts: [IO, HO, MO]
    monthly_budget_pct_nav: [0.01, 0.02, 0.05, 0.10]
    tenors_days: [30, 60]
    deltas: [0.35, 0.50]
    iv_multipliers_to_realized_vol: [1.3, 1.6]
