            rebalance_frequency: monthly
            max_contracts: 4
          long_option:
            product: MO
            option_type: put
            premium_budget_pct_nav: 0.003
            target_abs_delta: 0.35
            min_dte: 30
            max_dte: 75
            exit_dte: 5
        - label: neighborhood_im_long_mo_call_high
          futures:
            product: IM
            direction: long
            target_notional_multiple: 0.35
            cash_buffer_pct: 0.15
            min_dte: 5
            rebalance_frequency: monthly
            max_contracts: 4
          long_option:
            product: MO
            option_type: call
            premium_budget_pct_nav: 0.008
            target_abs_delta: 0.35
            min_dte: 30
            max_dte: 75
            exit_dte: 5

  stress:
    max_combinations: 20
    budget:
      max_windows: 48
      max_window_evaluations: 960
      max_promotions: 0
      futures_slippage_bps: 3.0
      option_slippage_bps: 6.0
      prior_day_volume_participation: 0.05
    overlay_only:
      enabled: true
      futures:
