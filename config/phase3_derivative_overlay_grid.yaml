          long_option:
            product: IO
            option_type: put
            premium_budget_pct_nav: 0.008
            target_abs_delta: 0.35
            min_dte: 30
            max_dte: 75
            exit_dte: 5
        - label: neighborhood_im_short_mo_put_low
