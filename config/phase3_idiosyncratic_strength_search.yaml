search_id: phase3_idiosyncratic_strength_v1
base_config: config/phase2_free_real_data.yaml
holdout_registry: config/phase3_holdout_registry.yaml
output_root: /Volumes/PSSD1TB/量化数据/reports/phase3_search
repo_status_report: reports/phase3_idiosyncratic_strength_search_status.md

compute:
  max_peak_rss_gib: 10.0

sampling:
  method: discrete_latin_hypercube
  seed: 20260711
  budget_per_family: 24
  development_min_target_ratio: 0.75
  development_max_drawdown: 0.60
  neighborhood_min_dimensions: 2

stages:
  screen:
    max_windows: 24
    window_sampling: even
    window_start_min: 2011-07-01
    window_start_max: 2012-12-31
    deposit_timings: [beginning, ending]
    max_daily_amount_participation: 0.05
    slippage_multiplier: 1.0
    promote_per_family: 2
    promote_global: 12
    allow_ungated_shortlist: true
    expand_parameter_neighbors: false
    require_neighborhood_gate: false
    promotion_gate: exploratory
    evidence_role: development_exposed
    holdout_signature: dev_screen_2011_2012_exposed
    min_regime_blocks: 2
  confirm:
    max_windows: 0
    window_sampling: even
    window_start_min: 2015-01-01
    window_start_max: 2015-12-31
    deposit_timings: [beginning, ending]
    max_daily_amount_participation: 0.05
    slippage_multiplier: 1.0
    promote_per_family: 0
    promote_global: 0
    allow_ungated_shortlist: false
    expand_parameter_neighbors: true
    require_neighborhood_gate: true
    promotion_gate: development
    evidence_role: development_exposed
    holdout_signature: dev_confirm_2015_exposed
    min_regime_blocks: 2
  stress:
    max_windows: 0
    window_sampling: even
    window_start_min: 2018-01-01
    window_start_max: 2024-12-31
    deposit_timings: [beginning, ending]
    max_daily_amount_participation: 0.05
    slippage_multiplier: 3.0
    promote_per_family: 0
    promote_global: 0
    allow_ungated_shortlist: false
    expand_parameter_neighbors: false
    require_neighborhood_gate: true
    promotion_gate: formal
    evidence_role: development_exposed
    holdout_signature: dev_stress_2018_2024_exposed
    min_regime_blocks: 2

strategy_spaces:
  S30_real_idiosyncratic_strength:
    kind: real_idiosyncratic_strength
    budget: 24
    ordered_parameters: [beta_window, strength_window]
    fixed:
      data_tier: free_real
      lookback: 245
      skip_recent: 5
      residual_vol_window: 60
      residual_vol_penalty: 1.0
      min_residual_momentum: 0.0
      holding_k: 10
      rebalance: weekly
      min_listing_days: 180
      min_price: 3.0
      min_avg_amount_20d: 20000000
      exclude_st: true
    parameters:
      beta_window: [40, 60, 80, 90, 100, 120]
      strength_window: [20, 40, 60, 80, 100, 120]
